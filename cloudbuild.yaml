steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/alien-drake-487413-q3/ssh-panel', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/alien-drake-487413-q3/ssh-panel']
- name: 'gcr.io/cloud-builders/gcloud'
  args: ['run', 'deploy', 'ssh-panel', 
         '--image', 'gcr.io/alien-drake-487413-q3/ssh-panel',
         '--region', 'northamerica-northeast1',
         '--platform', 'managed',
         '--allow-unauthenticated',
         '--port', '8080',
         '--memory', '1Gi',
         '--cpu', '1',
         '--timeout', '3600']
images:
- 'gcr.io/alien-drake-487413-q3/ssh-panel'
